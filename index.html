<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#0b0c14" />
    <title>VantaCard | Live Demo Card</title>
    <meta
      name="description"
      content="Luxury phone-first VantaCard demo with live actions, QR access, and wallet-ready presentation."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260427-06" />
  </head>
  <body>
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>

    <main class="page-shell">
      <section class="phone-stage" aria-label="VantaCard phone demo">
        <div class="phone-frame">
          <div class="phone-notch"></div>

          <article class="phone-card" aria-label="VantaCard digital business card">
            <div class="status-pill">
              <span class="status-dot"></span>
              <span data-i18n="status">Lista para compartir</span>
            </div>

            <header class="identity-row">
              <div class="logo-box">
                <img src="./logo.png" alt="VantaCard logo" />
              </div>

              <div class="identity-copy">
                <h1 data-i18n="brand">VantaCard</h1>
                <p class="role" data-i18n="role">Estudio de Identidad Digital</p>
              </div>
            </header>

            <div class="language-toggle" aria-label="Language selector">
              <button class="lang-button" type="button" data-lang="en" aria-pressed="false">EN</button>
              <button class="lang-button is-active" type="button" data-lang="es" aria-pressed="true">ES</button>
            </div>

            <div class="action-grid" aria-label="Primary actions">
              <button class="action-pill" type="button" data-i18n="actionPhone">Llamar</button>
              <button class="action-pill" type="button" data-i18n="actionEmail">Correo</button>
              <button class="action-pill" type="button" data-i18n="actionWeb">Web</button>
              <button class="action-pill" type="button" data-i18n="actionWhatsapp">WhatsApp</button>
            </div>

            <p class="demo-note" data-i18n="demoNote">
              Vista previa: los botones son solo de muestra y no activan acciones reales en esta demo.
            </p>

            <section class="content-block" aria-label="About this demo card">
              <p class="section-label" data-i18n="aboutLabel">Acerca de</p>
              <p class="description" data-i18n="description">
                Una tarjeta móvil premium con acciones en vivo, acceso por QR y opción para
                compartir desde Wallet.
              </p>
            </section>

            <div class="social-row" aria-label="Social links">
              <button class="social-link" type="button" aria-label="LinkedIn">IN</button>
              <button class="social-link" type="button" aria-label="Instagram">IG</button>
              <button class="social-link" type="button" aria-label="X">X</button>
            </div>

            <div class="bottom-row">
              <div class="qr-block">
                <div class="qr-code" aria-hidden="true"></div>
                <p class="qr-caption" data-i18n="qrCaption">Escanea y mira</p>
              </div>

              <button class="wallet-pill" type="button" data-i18n="walletAction">
                Pase Wallet
              </button>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script src="./script.js?v=20260427-06"></script>
  </body>
</html>
